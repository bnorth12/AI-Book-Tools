name: Test Static Files

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint HTML files
      run: |
        npm install -g htmlhint
        htmlhint "**/*.html" || true

    - name: Check for console.log statements
      run: |
        if grep -r "console\.log" --include="*.js" --include="*.html" .; then
          echo "⚠️  Found console.log statements that should be removed for production"
        else
          echo "✅ No console.log statements found"
        fi

    - name: Validate JSON files
      run: |
        for file in $(find . -name "*.json" -not -path "./node_modules/*"); do
          if ! jq empty "$file" 2>/dev/null; then
            echo "❌ Invalid JSON: $file"
            exit 1
          fi
        done
        echo "✅ All JSON files are valid"

    - name: Check file sizes
      run: |
        echo "📊 File sizes:"
        find . -name "*.html" -o -name "*.js" -o -name "*.css" | xargs ls -lh | head -20