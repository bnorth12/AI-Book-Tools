name: Regression And Governance

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      run_playwright:
        description: 'Run Playwright E2E tests'
        required: true
        default: false
        type: boolean

jobs:
  governance:
    name: Governance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Governance
        run: npm run test:governance

  playwright-on-demand:
    name: Playwright E2E (On Demand)
    if: github.event_name == 'workflow_dispatch' && inputs.run_playwright == true
    runs-on: ubuntu-latest
    needs: governance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run test:e2e:install

      - name: Run Playwright Tests
        run: npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
