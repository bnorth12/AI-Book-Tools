<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Decomposer v0.2.0</title>
    <style>
        .tabcontent { display: none; padding: 20px; }
        .tabcontent.active { display: block; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="tab">
        <button onclick="showTab(1)">Input Book</button>
        <button onclick="showTab(2)">Chapters Preview</button>
        <button onclick="showTab(3)">Extracted Elements</button>
        <button onclick="showTab(4)">Output JSON</button>
    </div>

    <div id="tab1" class="tabcontent active">
        <h2>Input Book</h2>
        <label for="title">Book Title:</label><br>
        <input type="text" id="title" name="title" placeholder="Enter book title"><br><br>
        <label for="bookFile">Upload Book Text File (.txt):</label><br>
        <input type="file" id="bookFile" accept=".txt"><br><br>
        <label for="apiKey">API Key:</label><br>
        <input type="text" id="apiKey" name="apiKey" placeholder="Enter your API key"><br><br>
        <label for="model">Model:</label><br>
        <select id="model" name="model" onchange="toggleCustomModelInput()">
            <option value="grok-4.20-0309-reasoning" selected>grok-4.20-0309-reasoning (Recommended)</option>
            <option value="grok-4.20-0309-non-reasoning">grok-4.20-0309-non-reasoning</option>
            <option value="grok-4.20-multi-agent-0309">grok-4.20-multi-agent-0309</option>
            <option value="grok-4-1-fast-reasoning">grok-4-1-fast-reasoning</option>
            <option value="grok-4-1-fast-non-reasoning">grok-4-1-fast-non-reasoning</option>
            <option value="custom">Custom model...</option>
        </select><br><br>
        <label for="customModel" id="customModelLabel" style="display:none;">Custom Model Name:</label><br>
        <input type="text" id="customModel" name="customModel" placeholder="Enter custom model name" style="display:none;"><br><br>
        <button onclick="processBook()">Process Book</button>
        <p id="loading" style="display:none;">Processing...</p>
    </div>

    <div id="tab2" class="tabcontent">
        <h2>Chapters Preview</h2>
        <table id="chaptersTable"><tr><th>Chapter</th><th>Preview</th></tr></table>
    </div>

    <div id="tab3" class="tabcontent">
        <h2>Extracted Elements</h2>
        <table id="elementsTable"><tr><th>Field</th><th>Value</th></tr></table>
    </div>

    <div id="tab4" class="tabcontent">
        <h2>Output JSON</h2>
        <button onclick="exportJSON()">Export JSON</button>
        <button onclick="importJSON()">Import JSON</button>
        <pre id="jsonOutput"></pre>
    </div>

    <script src="BookDecomposer.js"></script>
</body>
</html>
